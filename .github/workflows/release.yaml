name: Release
run-name: Release - ${{ github.event.inputs.PACKAGE }}

on:
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: 'The package you wish to release'
        type: choice
        options:
        - opentelemetry-baggage-span-processor
        - opentelemetry-instrumentation-connect-node
        - opentelemetry-mutable-baggage
        required: true
      VERSION_BUMP:
        description: 'The version bump'
        type: choice
        options:
        - major
        - minor
        - patch
        default: minor
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    environment: release
    permissions:
      contents: write
      id-token: write
    env:
      NPM_WORKSPACE: packages/${{ github.event.inputs.PACKAGE }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Setup Node.js version
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org/'

    - name: Install node packages
      run: npm ci

    - name: Configure git
      run: |
        git config user.name "Uphold"
        git config user.email "bot@uphold.com"
        git config --global url.https://${{ secrets.RELEASE_GITHUB_TOKEN }}@github.com/.insteadOf https://github.com/

    - name: Generate release
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
      run: |
        npm run release --workspace $NPM_WORKSPACE -- --increment ${{ github.event.inputs.VERSION_BUMP }} -V
